<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Eventos MapView</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script
      type="module"
      src="https://js.arcgis.com/5.0/"
    ></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>

    <script
      type="module"
      src="main.js"
      defer
    ></script>
  </head>
  <body>
    <arcgis-map
      basemap="dark-gray"
      center="-3.7,40.40"
      zoom="10"
    ></arcgis-map>
  </body>
</html>
