<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basemap Toggle</title>
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }
    </style>
</head>

<body>
    <arcgis-map center="-3,40" zoom="10" basemap="dark-gray" >
        <arcgis-basemap-toggle slot="top-right"></arcgis-basemap-toggle>
    </arcgis-map>

</body>

</html>
